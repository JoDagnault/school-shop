services:
  api:
    build: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SchoolShop: Host=db;Port=5432;Database=school_shop;Username=school_shop;Password=school_shop
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: school_shop
      POSTGRES_USER: school_shop
      POSTGRES_PASSWORD: school_shop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_shop -d school_shop"]
      interval: 5s
      timeout: 5s
      retries: 5
